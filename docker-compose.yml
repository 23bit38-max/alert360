version: '3.8'

services:
  backend:
    build:
      context: ./model
    ports:
      - "8000:8000"
    volumes:
      - ./model/storage:/app/storage
      - ./model/models:/app/models
    environment:
      # Optional: any env files or vars
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
